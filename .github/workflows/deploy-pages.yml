name: deploy-pages

# Builds the client as a static, practice-only site and publishes it to
# GitHub Pages. The build sets VITE_DEFAULT_MODE=solo so the homepage lands on
# offline practice (no relay needed) and VITE_BASE=/choccus/ for the project
# site subpath. Online mode is intentionally non-functional here (no relay).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static practice-only site
        run: npm run build
        env:
          VITE_DEFAULT_MODE: solo
          VITE_BASE: /choccus/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
