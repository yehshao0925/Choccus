name: build-image

# Builds the Docker image and pushes it to ghcr. PRs push a `dev` + `sha-`
# tagged test image you can spin a server from; main additionally moves the
# `latest` tag. The merge gate (lint + tests) lives in test.yml.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `latest` only on main; PRs move `dev` and always get an immutable sha
      # tag. Fork PRs get a read-only token and would fail to push, but this
      # repo only builds its own branches.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.event_name == 'pull_request' }}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
